<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @font-face {
      font-family: "Inter";
      src: local("Inter"), local("-apple-system"), local("SF Pro Display");
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
      color: #f2f2f4;
      background: #08090a;
    }
    .wrap {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 70px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        radial-gradient(ellipse at 80% 100%, rgba(1, 253, 72, 0.16), transparent 55%),
        radial-gradient(ellipse at 10% 0%, rgba(23, 254, 160, 0.07), transparent 50%),
        #08090a;
    }
    .wrap::before {
      /* Subtle film grain */
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
      mix-blend-mode: overlay;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo { flex-shrink: 0; }
    .brand {
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, #17FEA0, #01FD48);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border: 1px solid #2e2f35;
      border-radius: 999px;
      color: #a3a3a8;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 16px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #01FD48; box-shadow: 0 0 8px #01FD48;
    }
    h1 {
      font-size: 104px;
      line-height: 0.95;
      letter-spacing: -0.03em;
      font-weight: 700;
      max-width: 15ch;
    }
    em {
      font-style: italic;
      color: #17FEA0;
      font-weight: 500;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      color: #71717a;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 15px;
    }
    .footer .key {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .footer kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px; height: 28px; padding: 0 8px;
      background: #0f1012;
      border: 1px solid #2e2f35;
      border-radius: 7px;
      color: #f2f2f4;
      font-family: inherit;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <svg class="logo" width="44" height="44" viewBox="0 0 100 100" fill="none">
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#17FEA0"/><stop offset="100%" stop-color="#01FD48"/>
          </linearGradient>
          <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0AA868"/><stop offset="100%" stop-color="#027A26"/>
          </linearGradient>
        </defs>
        <path d="M 88 50 L 82 56 L 36 82 L 36 74 Z" fill="url(#g2)"/>
        <path d="M 30 18 L 82 50 L 30 70 Z" fill="url(#g1)"/>
      </svg>
      <span class="brand">DaddyRecorder</span>
    </div>

    <div>
      <div class="eyebrow" style="margin-bottom: 22px;">
        <span class="dot"></span>
        A native Mac app · Apple silicon · Free to launch
      </div>
      <h1>The screen recorder that <em>edits</em> itself.</h1>
    </div>

    <div class="footer">
      <span class="key">Start or stop: <kbd>⌘</kbd><kbd>⇧</kbd><kbd>R</kbd></span>
      <span>daddyrecorder · v1.0</span>
    </div>
  </div>
</body>
</html>
